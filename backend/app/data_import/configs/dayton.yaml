city:
  name: Dayton
  slug: dayton
  state: OH
  center: [-84.1916, 39.7589]
  default_zoom: 12
  bounds: [[-84.35, 39.65], [-84.05, 39.85]]

sources:
  zoning:
    # Montgomery County / City of Dayton open data portal
    url: "https://data-mcohio.opendata.arcgis.com/datasets/zoning-districts.geojson"
    note: "Montgomery County open data — verify current endpoint at data-mcohio.opendata.arcgis.com"
  buildings:
    # Microsoft Building Footprints — Ohio state file
    url: "https://usbuildingdata.blob.core.windows.net/usbuildings-v2/Ohio.geojson.zip"
    fallback_url: "https://data-mcohio.opendata.arcgis.com/datasets/building-footprints.geojson"
    note: "Microsoft footprints cover entire state; clip to city bbox during import"
  transit_lines:
    # Greater Dayton RTA GTFS feed
    url: "https://transitfeeds.com/p/greater-dayton-rta/660/latest/download"
    fallback_url: "https://www.transit.land/feeds/f-dnh-greaterdaytonrta"
    note: "GTFS zip — extract shapes.txt for route geometries"
  transit_stations:
    # Greater Dayton RTA stops from GTFS
    url: "https://transitfeeds.com/p/greater-dayton-rta/660/latest/download"
    note: "Extract stops.txt from GTFS zip for station/stop points"
  waterways:
    # USGS National Hydrography Dataset — Great Miami River, Stillwater River, Mad River, Wolf Creek
    url: "https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer/6/query?where=1%3D1&geometry=-84.35%2C39.65%2C-84.05%2C39.85&geometryType=esriGeometryEnvelope&outFields=*&f=geojson"
    note: "NHD flowlines clipped to Dayton bbox; includes Great Miami, Stillwater, and Mad rivers"
  parks:
    # Five Rivers MetroParks and city parks
    url: "https://data-mcohio.opendata.arcgis.com/datasets/parks.geojson"
    note: "Montgomery County parks data — verify endpoint at data-mcohio.opendata.arcgis.com"
  railroads:
    fra_url: "https://data-usdot.opendata.arcgis.com/datasets/north-american-rail-network-lines.geojson"
    osm_overpass_bbox: "39.65,-84.35,39.85,-84.05"
  pois:
    osm_overpass_bbox: "39.65,-84.35,39.85,-84.05"
  parcels:
    note: "Montgomery County Auditor parcel data — requires manual download or ArcGIS REST API from mcrealgis.org"
  streets:
    note: "Streets come from basemap tiles; TIGER/Line import is optional"
