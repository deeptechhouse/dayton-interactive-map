city:
  name: Dayton
  slug: dayton
  state: OH
  center: [-84.1916, 39.7589]
  default_zoom: 12
  bounds: [[-84.35, 39.65], [-84.05, 39.85]]

sources:
  buildings:
    # City of Dayton ArcGIS REST — Building Footprints (layer 307)
    type: arcgis_rest
    url: "https://maps.daytonohio.gov/gisservices/rest/services/Viewer/MapLayers_Citywide/MapServer/307"
    fallback_url: "https://minedbuildings.z5.web.core.windows.net/legacy/usbuildings-v2/Ohio.geojson.zip"
    field_map:
      address: ""
      name: ""
      floors: "NUMSTORIES"
      height: "BLDGHEIGHT"
      type: "TYPE"
    note: "City of Dayton ArcGIS building footprints; fallback is Microsoft US Building Footprints (clip to bbox)"

  zoning:
    # City of Dayton ArcGIS REST — Zoning Districts (layer 203)
    type: arcgis_rest
    url: "https://maps.daytonohio.gov/gisservices/rest/services/Viewer/MapLayers_Citywide/MapServer/203"
    field_map:
      zone_code: "DISTRICT"
      zone_name: "NAME"
      new_zoning: "NEW_ZONE"
    note: "City of Dayton zoning districts"

  parcels:
    # City of Dayton ArcGIS REST — Parcels (layer 9)
    type: arcgis_rest
    url: "https://maps.daytonohio.gov/gisservices/rest/services/Viewer/MapLayers_Citywide/MapServer/9"
    county_url: "https://services6.arcgis.com/EbVsqZ18sv1kVJ3k/ArcGIS/rest/services/Montgomery_County_Parcels/FeatureServer/0"
    field_map:
      pin: "TAXPINNO"
      address_num: "LOC_NBR"
      address_dir: "LOC_DIR"
      address_street: "LOC_STREET"
      address_suffix: "LOC_SUFFIX"
      acreage: "ACREAGE"
    note: "City parcels (within limits); county parcels have owner info via Montgomery County Auditor"

  transit_lines:
    # Greater Dayton RTA GTFS feed (bus routes)
    url: "http://proc.greaterdaytonrta.org/gtfs/google_transit.zip"
    note: "GTFS zip — extract shapes.txt for route geometries; bus-only system (no rail)"

  transit_stations:
    # Greater Dayton RTA stops from GTFS
    url: "http://proc.greaterdaytonrta.org/gtfs/google_transit.zip"
    note: "Extract stops.txt from GTFS zip for bus stop points"

  waterways:
    # USGS National Hydrography Dataset — Flowlines clipped to Dayton bbox
    type: arcgis_rest
    url: "https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer/6"
    bbox: [-84.35, 39.65, -84.05, 39.85]
    note: "NHD flowlines: Great Miami River, Stillwater River, Mad River, Wolf Creek"

  parks:
    # OpenStreetMap Overpass API — parks within Dayton bbox
    osm_overpass_bbox: "39.65,-84.35,39.85,-84.05"
    osm_tags: "leisure=park"
    note: "Five Rivers MetroParks + city parks via OSM; no official GIS download available"

  railroads:
    osm_overpass_bbox: "39.65,-84.35,39.85,-84.05"
    note: "Railroad lines from OpenStreetMap"

  pois:
    osm_overpass_bbox: "39.65,-84.35,39.85,-84.05"
    note: "Points of interest from OpenStreetMap Overpass"

  police_districts:
    # City of Dayton Police Areas — District boundaries (layer 0)
    type: arcgis_rest
    url: "https://maps.daytonohio.gov/gisservices/rest/services/Police/PoliceAreas/MapServer/0"
    field_map:
      district: "District"
    note: "Dayton Police Department district boundaries"

  neighborhoods:
    # City of Dayton Neighborhood boundaries (layer 310)
    type: arcgis_rest
    url: "https://maps.daytonohio.gov/gisservices/rest/services/Viewer/MapLayers_Citywide/MapServer/310"
    note: "Dayton recognized neighborhoods — replaces wards (Dayton uses at-large commission)"

  streets:
    # City of Dayton Centerlines (layer 312)
    type: arcgis_rest
    url: "https://maps.daytonohio.gov/gisservices/rest/services/Viewer/MapLayers_Citywide/MapServer/312"
    field_map:
      name: "GEONAME"
    note: "Street centerlines for major street extraction"

  zip_codes:
    url: "https://www2.census.gov/geo/tiger/TIGER2023/ZCTA520/tl_2023_us_zcta520.zip"
    filter_prefix: "453"
    note: "US Census TIGER/Line ZCTA — filter for 453xx Dayton-area zip codes"

interior:
  enabled: true
  osm:
    enabled: true
    overpass_bbox: [39.65, -84.35, 39.85, -84.05]
  county:
    name: "Montgomery County"
    assessor_api: ""
  sanborn:
    enabled: true
    loc_query: "sanborn dayton ohio"
    years: [1887, 1890, 1897, 1902, 1905, 1911, 1917, 1923, 1950]
  venue_scraping:
    enabled: true
    categories: ["church", "hotel_event", "theater", "museum", "community_center", "gymnasium", "music_venue", "gallery"]
  permits:
    enabled: true
    socrata_url: ""
